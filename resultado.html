<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado - CIPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">CIPA</h1>
            <p class="text-xl text-gray-600">Resultado da Votação</p>
            <p class="text-sm text-gray-500 mt-2">Atualizado em: <span id="ultima-atualizacao">--:--</span></p>
        </div>

        <!-- Estatísticas -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-600 text-sm">Total de Votos</p>
                <p class="text-3xl font-bold text-blue-600" id="total-votos">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-600 text-sm">Total de Eleitores</p>
                <p class="text-3xl font-bold text-indigo-600" id="total-eleitores">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-600 text-sm">Eleitores que Votaram</p>
                <p class="text-3xl font-bold text-green-600" id="eleitores-votaram">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-600 text-sm">Comparecimento</p>
                <p class="text-3xl font-bold text-purple-600" id="comparecimento">0%</p>
            </div>
        </div>

        <!-- Resultado por Candidato -->
        <div class="bg-white rounded-lg shadow p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6">Resultado por Candidato</h2>
            <div id="resultado-lista" class="space-y-6">
                <p class="text-center text-gray-500">Carregando...</p>
            </div>
        </div>

        <!-- Gráfico de Votação -->
        <div class="bg-white rounded-lg shadow p-8">
            <h2 class="text-2xl font-bold mb-6">Distribuição de Votos</h2>
            <div id="grafico-barras" class="space-y-4">
                <p class="text-center text-gray-500">Carregando...</p>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="mt-8 flex gap-4 justify-center">
            <a href="votacao.html" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                Voltar para Votação
            </a>
            <button onclick="recarregar()" class="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700">
                Recarregar
            </button>
        </div>
    </div>

    <script>
        const API_URL = 'https://cipa.filipechaves.com.br/api';

        async function carregarResultado() {
            try {
                const response = await axios.get(`${API_URL}/votacao/resultado`);
                const data = response.data;

                // Atualiza estatísticas
                document.getElementById('total-votos').textContent = data.totalVotos;
                document.getElementById('total-eleitores').textContent = data.totalEleitores;
                document.getElementById('eleitores-votaram').textContent = data.eleitoresQueVotaram;
                document.getElementById('comparecimento').textContent = data.percentualComparencia.toFixed(1) + '%';
                document.getElementById('ultima-atualizacao').textContent = new Date().toLocaleTimeString('pt-BR');

                // Renderiza resultado por candidato
                const listDiv = document.getElementById('resultado-lista');
                if (data.resultados.length === 0) {
                    listDiv.innerHTML = '<p class="text-center text-gray-500">Nenhum voto registrado ainda</p>';
                } else {
                    listDiv.innerHTML = data.resultados.map((r, idx) => `
                        <div class="border-b pb-4 last:border-b-0">
                            <div class="flex justify-between items-center mb-2">
                                <div>
                                    <p class="font-semibold text-lg">
                                        <span class="text-blue-600 mr-2">Nº ${r.numero}</span>
                                        ${r.nome}
                                    </p>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-bold text-blue-600">${r.totalVotos}</p>
                                    <p class="text-sm text-gray-600">${r.percentual.toFixed(2)}%</p>
                                </div>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-8 overflow-hidden">
                                <div 
                                    class="bg-gradient-to-r from-blue-500 to-blue-600 h-8 flex items-center justify-end pr-2 transition-all duration-500"
                                    style="width: ${r.percentual}%"
                                >
                                    ${r.percentual > 5 ? `<span class="text-white font-bold text-sm">${r.percentual.toFixed(1)}%</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                // Renderiza gráfico de barras
                const graficoDiv = document.getElementById('grafico-barras');
                if (data.resultados.length === 0) {
                    graficoDiv.innerHTML = '<p class="text-center text-gray-500">Nenhum voto registrado ainda</p>';
                } else {
                    const maxVotos = Math.max(...data.resultados.map(r => r.totalVotos), 1);
                    graficoDiv.innerHTML = data.resultados.map(r => {
                        const altura = (r.totalVotos / maxVotos) * 100;
                        return `
                            <div class="flex items-end gap-4">
                                <div class="w-20 text-center">
                                    <p class="font-semibold">Nº${r.numero}</p>
                                    <p class="text-sm text-gray-600">${r.nome.substring(0, 10)}</p>
                                </div>
                                <div class="flex-1 flex items-end">
                                    <div class="bg-blue-500 rounded-t-lg transition-all duration-500" style="height: ${Math.max(altura * 200 / 100, 20)}px; width: 60px;"></div>
                                    <p class="ml-4 font-bold text-lg">${r.totalVotos} votos</p>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Erro ao carregar resultado:', error);
                document.getElementById('resultado-lista').innerHTML = '<p class="text-center text-red-600">Erro ao carregar dados</p>';
            }
        }

        function recarregar() {
            carregarResultado();
        }

        // Carrega resultado ao abrir a página
        carregarResultado();

        // Recarrega a cada 10 segundos
        setInterval(carregarResultado, 10000);
    </script>
</body>
</html>
